<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<article style="background:#1c1710;border:1px solid rgba(200,150,62,.22);border-radius:6px;overflow:hidden;height:100%;display:flex;flex-direction:column;transition:border-color .2s,transform .2s" style-hover="border-color:rgba(200,150,62,.5);transform:translateY(-3px)">

  <!-- ===== compact (era clásica) ===== -->
  <sc-if value="{{ isCompact }}" hint-placeholder-val="{{ false }}">
    <div style="position:relative;height:96px;border-bottom:1px solid rgba(200,150,62,.16)">
      <image-slot id="{{ slotId }}" style="display:block;width:100%;height:100%" shape="rect" src="{{ imageSrc }}" placeholder="{{ imageLabel }}"></image-slot>
      <div style="position:absolute;top:8px;left:10px;font-family:'Archivo';font-weight:900;font-size:20px;color:rgba(230,189,115,.85);line-height:1;text-shadow:0 2px 6px rgba(0,0,0,.6);pointer-events:none">{{ year }}</div>
    </div>
    <div style="padding:14px 16px 16px;display:flex;flex-direction:column;flex:1">
      <h4 style="margin:0 0 6px;font-family:'Archivo';font-weight:700;font-size:16px;line-height:1.15">{{ title }}</h4>
      <p style="margin:0 0 12px;font-size:12.5px;line-height:1.5;color:#b7a889;flex:1">{{ premise }}</p>
      <sc-if value="{{ hasSteam }}" hint-placeholder-val="{{ false }}">
        <a href="{{ steamUrl }}" target="_blank" rel="noopener noreferrer" onClick="{{ trackSteam }}" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;background:#c8963e;color:#13100b;font-family:'Archivo';font-weight:700;font-size:12px;padding:8px 12px;border-radius:2px;align-self:flex-start" style-hover="background:#e6bd73" style-focus="outline:3px solid #e6bd73;outline-offset:2px">Comprar en Steam <span aria-hidden="true">↗</span></a>
      </sc-if>
      <sc-if value="{{ showNote }}" hint-placeholder-val="{{ true }}">
        <span style="font-size:11.5px;color:#7d7261;line-height:1.4">{{ steamNote }}</span>
      </sc-if>
    </div>
  </sc-if>

  <!-- ===== full (legend/lau, survivor) ===== -->
  <sc-if value="{{ notCompact }}" hint-placeholder-val="{{ true }}">
    <div style="position:relative;min-height:190px;border-bottom:1px solid rgba(200,150,62,.16)">
      <image-slot id="{{ slotId }}" style="display:block;width:100%;height:100%;min-height:190px" shape="rect" src="{{ imageSrc }}" placeholder="{{ imageLabel }}"></image-slot>
      <div style="position:absolute;top:12px;left:12px;font-family:'Archivo';font-weight:900;font-size:32px;color:rgba(230,189,115,.9);line-height:1;text-shadow:0 2px 8px rgba(0,0,0,.6);pointer-events:none">{{ year }}</div>
      <sc-if value="{{ hasRating }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;top:12px;right:12px;font-family:'Barlow';font-weight:700;font-size:11px;letter-spacing:.06em;color:#e4d8bf;background:rgba(12,9,5,.6);border:1px solid rgba(230,189,115,.4);padding:3px 8px;border-radius:2px;pointer-events:none">{{ rating }}</div>
      </sc-if>
    </div>
    <div style="padding:22px 24px 24px;display:flex;flex-direction:column;flex:1">
      <div style="font-family:'Barlow';font-weight:600;font-size:11.5px;letter-spacing:.14em;color:#a85a32;margin-bottom:8px">{{ era }}</div>
      <h4 style="margin:0 0 10px;font-family:'Archivo';font-weight:900;font-size:24px;line-height:1.05">{{ title }}</h4>
      <p style="margin:0 0 20px;font-size:14.5px;line-height:1.6;color:#d9cbae;flex:1">{{ premise }}</p>
      <sc-if value="{{ hasSteam }}" hint-placeholder-val="{{ true }}">
        <a href="{{ steamUrl }}" target="_blank" rel="noopener noreferrer" onClick="{{ trackSteam }}" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;background:#c8963e;color:#13100b;font-family:'Archivo';font-weight:700;font-size:13.5px;padding:11px 18px;border-radius:2px;align-self:flex-start;transition:background .2s,transform .2s" style-hover="background:#e6bd73;transform:translateY(-2px)" style-focus="outline:3px solid #e6bd73;outline-offset:2px">Comprar en Steam <span aria-hidden="true">↗</span></a>
      </sc-if>
      <sc-if value="{{ showNote }}" hint-placeholder-val="{{ false }}">
        <span style="font-size:12.5px;color:#7d7261;line-height:1.5;border-top:1px solid rgba(200,150,62,.16);padding-top:12px">{{ steamNote }}</span>
      </sc-if>
    </div>
  </sc-if>
</article>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:420},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Tomb Raider&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;year&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;2013&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;era&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;REINICIO · CRYSTAL DYNAMICS&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;premise&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;El origen. Una Lara joven aprende a sobrevivir.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;rating&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hasSteam&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;steamUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;steamNote&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;imageLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Key art oficial&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;imageSrc&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;compact&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;slotId&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  trackSteam = () => {
    console.log('[track] outbound_steam_click', { title: this.props.title, year: this.props.year, era: this.props.era });
  };
  renderVals() {
    const hasSteam = !!this.props.hasSteam;
    return {
      title: this.props.title ?? '',
      year: this.props.year ?? '',
      era: this.props.era ?? '',
      premise: this.props.premise ?? '',
      rating: this.props.rating ?? '',
      hasRating: !!this.props.rating,
      hasSteam,
      showNote: !hasSteam,
      steamUrl: this.props.steamUrl || '#',
      steamNote: this.props.steamNote ?? '',
      imageLabel: this.props.imageLabel ?? 'Key art oficial',
      imageSrc: this.props.imageSrc || '',
      slotId: this.props.slotId || ('card-' + (this.props.title || 'sinnombre') + '-' + (this.props.year || '')).toLowerCase().replace(/[^a-z0-9]+/g, '-'),
      isCompact: !!this.props.compact,
      notCompact: !this.props.compact,
      trackSteam: this.trackSteam,
    };
  }
}
</script>
</body>
</html>
